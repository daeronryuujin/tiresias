name: Update VPM Listing

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-listing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get version
        id: release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build clean zip
        run: |
          mkdir -p /tmp/pkg
          cp -r Editor CLAUDE.md README.md package.json /tmp/pkg/
          cd /tmp/pkg
          zip -r /tmp/tiresias-${{ steps.release.outputs.version }}.zip .
          echo "Built zip:"
          unzip -l /tmp/tiresias-${{ steps.release.outputs.version }}.zip | head -20

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum /tmp/tiresias-${{ steps.release.outputs.version }}.zip | awk '{print $1}')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.release.outputs.tag }} \
            /tmp/tiresias-${{ steps.release.outputs.version }}.zip \
            --clobber

      - name: Set zip URL
        id: url
        run: |
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/tiresias-${{ steps.release.outputs.version }}.zip"
          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      - name: Update index.json
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          ZIP_URL="${{ steps.url.outputs.zip_url }}"
          SHA="${{ steps.sha.outputs.sha }}"

          jq --arg version "$VERSION" \
             --arg url "$ZIP_URL" \
             --arg sha "$SHA" \
             '.packages["com.daeronryuujin.tiresias"].versions[$version] = {
               "name": "com.daeronryuujin.tiresias",
               "displayName": "Tiresias",
               "version": $version,
               "unity": "2019.4",
               "description": "Unity Editor REST API that exposes scene state, assets, and compiler status for AI code assistant integration.",
               "url": $url,
               "zipSHA256": $sha
             }' index.json > index.tmp.json && mv index.tmp.json index.json

          echo "Updated index.json:"
          cat index.json

      - name: Commit updated index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "VPM: add version ${{ steps.release.outputs.version }}"
          git push