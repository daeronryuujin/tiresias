name: Update VPM Listing

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-listing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"  # strip leading 'v' if present
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          ZIP_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.event.release.tag_name }}.zip"
          echo "zip_url=$ZIP_URL" >> $GITHUB_OUTPUT

      - name: Compute zip SHA256
        id: sha
        run: |
          curl -sL "${{ steps.release.outputs.zip_url }}" -o package.zip
          SHA=$(sha256sum package.zip | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update index.json
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          ZIP_URL="${{ steps.release.outputs.zip_url }}"
          SHA="${{ steps.sha.outputs.sha }}"

          python3 - <<EOF
          import json, sys

          with open('index.json', 'r') as f:
              data = json.load(f)

          pkg = data['packages']['com.daeronryuujin.tiresias']

          pkg['versions']['$VERSION'] = {
              'name': 'com.daeronryuujin.tiresias',
              'displayName': 'Tiresias',
              'version': '$VERSION',
              'unity': '2019.4',
              'description': 'Unity Editor REST API that exposes scene state, assets, and compiler status for AI code assistant integration.',
              'url': '$ZIP_URL',
              'zipSHA256': '$SHA'
          }

          with open('index.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Added version $VERSION to index.json")
          EOF

      - name: Commit updated index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "VPM: add version ${{ steps.release.outputs.version }}"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
