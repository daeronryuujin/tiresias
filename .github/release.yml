name: Update VPM Listing

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-listing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get version and zip URL
        id: release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          ZIP_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "zip_url=${ZIP_URL}" >> $GITHUB_OUTPUT

      - name: Compute zip SHA256
        id: sha
        run: |
          curl -sL "${{ steps.release.outputs.zip_url }}" -o package.zip
          SHA=$(sha256sum package.zip | awk '{print $1}')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Update index.json
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          ZIP_URL="${{ steps.release.outputs.zip_url }}"
          SHA="${{ steps.sha.outputs.sha }}"

          jq --arg version "$VERSION" \
             --arg url "$ZIP_URL" \
             --arg sha "$SHA" \
             '.packages["com.daeronryuujin.tiresias"].versions[$version] = {
               "name": "com.daeronryuujin.tiresias",
               "displayName": "Tiresias",
               "version": $version,
               "unity": "2019.4",
               "description": "Unity Editor REST API that exposes scene state, assets, and compiler status for AI code assistant integration.",
               "url": $url,
               "zipSHA256": $sha
             }' index.json > index.tmp.json && mv index.tmp.json index.json

          echo "Updated index.json with version $VERSION"

      - name: Commit updated index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "VPM: add version ${{ steps.release.outputs.version }}"
          git push
