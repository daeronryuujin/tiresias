{% extends "layout.html" %}
{% block title %}Shows — Contest Dashboard{% endblock %}
{% block content %}
<h1>Shows</h1>

<form method="POST" action="{{ url_for('shows.create_show_page') }}" class="form-inline">
    <input type="text" name="title" placeholder="Show title" required>
    <input type="date" name="date" required>
    <button type="submit">Create Show</button>
</form>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Date</th>
            <th>Status</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for show in shows %}
        <tr>
            <td>{{ show.id }}</td>
            <td>{{ show.title }}</td>
            <td>{{ show.date }}</td>
            <td><span class="badge badge-{{ show.status }}">{{ show.status }}</span></td>
            <td><a href="{{ url_for('shows.show_detail_page', show_id=show.id) }}">Manage</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
